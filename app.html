<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | CourseMate AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Add this line to parse Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --sidebar-width: 280px;
            --primary: #4f46e5;
            --bg-chat: #ffffff;
            --bg-side: #f8fafc;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-chat); 
            color: var(--text-main); 
            display: flex; 
            height: 100dvh; /* 🔥 dynamic viewport */
            overflow: hidden; 
        }

        /* Sidebar Styling */
        aside { 
            width: var(--sidebar-width); 
            background: var(--bg-side); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 1.5rem; 
            transition: all 0.3s ease; 
            z-index: 1000;
        }

        .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
        .logo-area { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }
        .brand-name { font-weight: 700; font-size: 1.1rem; color: var(--text-main); }
        
        /* Mobile Close Button */
        .close-sidebar { display: none; background: none; border: none; font-size: 1.25rem; color: var(--text-muted); cursor: pointer; padding: 5px; }

        .btn-new-chat { background: var(--primary); color: white; border: none; padding: 0.8rem; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem; transition: 0.2s; }
        
        .nav-menu { list-style: none; flex: 1; }
        .nav-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin: 1.5rem 0 0.5rem 0.5rem; font-weight: 700; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; color: var(--text-main); text-decoration: none; border-radius: 8px; font-size: 0.95rem; margin-bottom: 0.25rem; transition: 0.2s; }
        .nav-item:hover { background: #eef2ff; color: var(--primary); }
        .nav-item i { width: 20px; font-size: 1rem; opacity: 0.7; }

        /* Dynamic File Display in Sidebar */
        #active-doc-link { display: none; background: #fff; border: 1px solid var(--border); margin-top: 0.5rem; }
        #active-doc-link span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; font-weight: 500; font-size: 0.85rem; }

        /* Main Chat Area */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            width: 100%; 
            min-width: 0; 
            height: 100%;
        }
        header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; background: white; }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        
        .chat-container { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
        .message { display: flex; gap: 0.75rem; max-width: 800px; width: 100%; margin: 0 auto; }
        .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 4px; }
        .ai-avatar { background: var(--primary); color: white; }
        .user-avatar { background: #e2e8f0; color: var(--text-main); }
        .msg-content { background: #f1f5f9; padding: 1rem; border-radius: 0 12px 12px 12px; font-size: 0.95rem; line-height: 1.5; border: 1px solid var(--border); }
        .message.user { flex-direction: row-reverse; }
        .message.user .msg-content { background: var(--primary); color: white; border-radius: 12px 0 12px 12px; border: none; }

        /* Input Bar */
        .input-wrapper { padding: 1rem 1.5rem 1.5rem; background: white; border-top: 1px solid var(--border); }
        .input-container { max-width: 800px; margin: 0 auto; display: flex; align-items: center; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; padding: 0.4rem 0.75rem; }
        #chat-input { flex: 1; border: none; background: transparent; padding: 0.75rem; outline: none; font-size: 1rem; min-width: 0; }
        
        /* Buttons explicitly typed as "button" to prevent reload */
        .icon-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1.1rem; padding: 8px; }
        .send-btn { background: var(--primary); color: white; width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* Mobile Adjustments */
        .menu-toggle { display: none; background: none; border: none; font-size: 1.25rem; cursor: pointer; color: var(--text-main); }

        @media (max-width: 768px) {
            aside { position: fixed; left: -100%; height: 100%; box-shadow: 20px 0 50px rgba(0,0,0,0.1); width: 85%; }
            aside.active { left: 0; }
            .close-sidebar { display: block; }
            .menu-toggle { display: block; }
            .chat-container { padding: 1rem; }
            .message { max-width: 100%; }
        }
        @media (max-width: 768px) {
            .input-wrapper {
                position: sticky;
                bottom: 0;
                z-index: 50;
                background: white;
                padding-bottom: env(safe-area-inset-bottom);
            }

            .chat-container {
                padding-bottom: 100px; /* space for input */
            }
        }
        /* Add these rules for formatted Markdown output */
        .msg-content p { margin-bottom: 0.75rem; }
        .msg-content p:last-child { margin-bottom: 0; }
        .msg-content ul, .msg-content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .msg-content li { margin-bottom: 0.25rem; }
        .msg-content h1, .msg-content h2, .msg-content h3 { margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1.1rem; color: #0f172a; }
        .msg-content strong { color: #1e293b; }
        .message.user .msg-content strong, .message.user .msg-content h1, .message.user .msg-content h2, .message.user .msg-content h3 { color: white; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-brain"></i></div>
                <span class="brand-name">Library</span>
            </div>
            <!-- Added Close Button for Mobile -->
            <button type="button" class="close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>

        <button type="button" class="btn-new-chat" onclick="window.location.reload()">
            <i class="fas fa-plus"></i> New Chat
        </button>

        <nav class="nav-menu">
            <!-- Simplified Navigation -->
            <a href="index.html" class="nav-item">
                <i class="fas fa-house"></i> Home
            </a>
            
            <div class="nav-label">Current File</div>
            <!-- Uploaded File Shows Here Directly -->
            <div id="active-doc-link" class="nav-item">
                <i class="fas fa-file-pdf" style="color: #ef4444;"></i>
                <span id="side-file-name">No file active</span>
            </div>
        </nav>

        <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);">
            <p style="font-size: 0.75rem; color: var(--text-muted); text-align: center;">CourseMate AI v1.0</p>
        </div>
    </aside>

    <main>
        <header>
            <div class="header-left">
                <button type="button" class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h2 style="font-size: 1.1rem; font-weight: 700;">CourseMate AI</h2>
            </div>
        </header>

        <div class="chat-container" id="chat-window">
            <div class="message ai">
                <div class="avatar ai-avatar"><i class="fas fa-robot"></i></div>
                <div class="msg-content">
                    Upload a PDF to start learning! I'll analyze it and answer any questions you have.
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="file" id="pdf-upload" hidden accept=".pdf">
                <!-- Explicit type="button" added below to prevent reload -->
                <button type="button" class="icon-btn" onclick="document.getElementById('pdf-upload').click()">
                    <i class="fas fa-paperclip"></i>
                </button>
                
                <input type="text" id="chat-input" placeholder="Ask about your document...">
                
                <button type="button" class="send-btn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
        <center><p style="font-size: 0.75rem; color: var(--text-muted); text-align: center;">Responses are solely based from the file you upload.</p></center>
    </main>

    <script>
        let session_id = null;
        const chatWindow = document.getElementById('chat-window');
        const chatInput = document.getElementById('chat-input');
        const fileInput = document.getElementById('pdf-upload');
        const sideFileName = document.getElementById('side-file-name');
        const activeDocLink = document.getElementById('active-doc-link');

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            // Show file in sidebar immediately
            activeDocLink.style.display = "flex";
            sideFileName.innerText = file.name;
            appendMessage('ai', `Analyzing <b>${file.name}</b>...`);

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('http://localhost:8000/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                session_id = data.session_id;
                appendMessage('ai', `Analysis complete. What would you like to know about "${file.name}"?`);
            } catch (err) {
                appendMessage('ai', 'Upload failed. Check if the backend is running.');
            }
        });

        async function sendMessage() {
            const query = chatInput.value.trim();
            if(!query || !session_id) {
                if(!session_id) appendMessage('ai', 'Please upload a PDF first!');
                return;
            }

            appendMessage('user', query);
            chatInput.value = '';
            
            const loadingId = 'loading-' + Date.now();
            appendMessage('ai', 'Searching document...', loadingId);

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ query, session_id })
                });
                const data = await response.json();
                // Use marked.parse to convert the Markdown into proper HTML elements
                document.getElementById(loadingId).innerHTML = marked.parse(data.answer);
            } catch (err) {
                document.getElementById(loadingId).innerText = "Error: Couldn't reach the AI server.";
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendMessage(role, text, id = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const icon = role === 'ai' ? 'fa-robot' : 'fa-user';
            
            msgDiv.innerHTML = `
                <div class="avatar ${role}-avatar"><i class="fas ${icon}"></i></div>
                <div class="msg-content" ${id ? `id="${id}"` : ''}>${text}</div>
            `;
            
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        chatInput.addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') sendMessage(); 
        });

        chatInput.addEventListener('focus', () => {
            setTimeout(() => {
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 300);
        });

        window.addEventListener('resize', () => {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    </script>
</body>
</html>
